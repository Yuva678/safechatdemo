<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeChat – Real-Time Cyber Threat Detector</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2a37;
      --muted: #6b7280;
      --user-bubble: #dbeafe;
      --safe: #1b8d45;
      --safe-bg: #eaf9f0;
      --scam: #d97706;
      --scam-bg: #fff3e6;
      --toxic: #b91c1c;
      --toxic-bg: #feeceb;
      --border: #e5e7eb;
      --shadow: 0 6px 24px rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Roboto, Arial, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 780px;
      height: 88vh;
      max-height: 860px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
    }

    .app-header h1 {
      font-size: 1.05rem;
      margin-bottom: 6px;
      color: #111827;
    }

    .app-header p {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.35;
      font-size: 0.95rem;
      border: 1px solid transparent;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border-top-right-radius: 4px;
    }

    .bubble.bot {
      align-self: flex-start;
      border-top-left-radius: 4px;
      background: #ffffff;
      border-color: var(--border);
    }

    .bubble.bot.safe {
      color: var(--safe);
      background: var(--safe-bg);
      border-color: #b4e7c6;
    }

    .bubble.bot.scam {
      color: var(--scam);
      background: var(--scam-bg);
      border-color: #ffd19c;
    }

    .bubble.bot.toxic {
      color: var(--toxic);
      background: var(--toxic-bg);
      border-color: #f5b7b1;
    }

    .bubble .result-title {
      font-weight: 700;
      margin-bottom: 6px;
    }

    .bubble .explanation {
      font-size: 0.88rem;
      opacity: 0.95;
      margin-bottom: 6px;
    }

    .bubble .tip {
      font-size: 0.84rem;
      font-style: italic;
      opacity: 0.9;
    }

    .composer {
      border-top: 1px solid var(--border);
      background: #fff;
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .composer input {
      flex: 1;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .composer input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.18);
    }

    .composer button {
      border: none;
      background: #2563eb;
      color: white;
      padding: 11px 18px;
      font-size: 0.92rem;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .composer button:hover {
      background: #1d4ed8;
    }

    .note {
      padding: 0 16px 12px;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
      }

      .app {
        border-radius: 0;
        height: 100vh;
        max-height: none;
      }

      .bubble {
        max-width: 88%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1>SafeChat – Real-Time Cyber Threat Detector</h1>
      <p>Protecting students from cyberbullying and scams</p>
    </header>

    <section id="chatArea" class="chat-area" aria-live="polite" aria-label="Chat messages">
      <div class="bubble bot safe">
        <div class="result-title">✅ Safe Message</div>
        <div class="explanation">Type a message to start real-time safety analysis.</div>
        <div class="tip">Safety tip: Think before you click unknown links.</div>
      </div>
    </section>

    <form id="chatForm" class="composer" autocomplete="off">
      <input
        id="messageInput"
        type="text"
        placeholder="Type your message..."
        aria-label="Type message"
      />
      <button type="submit">Send</button>
    </form>
    <p class="note">Real-time detection is active while typing.</p>
  </main>

  <script>
    const toxicWords = ["idiot", "stupid", "hate"];
    const scamWords = ["win", "money", "urgent", "otp", "click"];
    const suspiciousLinkWords = ["http", "bit.ly", "tinyurl"];

    const safetyTips = {
      toxic: [
        "Use respectful language to keep conversations healthy.",
        "Pause before sending if your message may hurt someone.",
      ],
      scam: [
        "Never share OTP with anyone.",
        "Verify urgent payment requests from official sources.",
      ],
      safe: [
        "Think before you click unknown links.",
        "Keep personal information private in online chats.",
      ],
    };

    const chatArea = document.getElementById("chatArea");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");

    let liveReplyElement = null;

    function getRandomTip(type) {
      const tips = safetyTips[type];
      return tips[Math.floor(Math.random() * tips.length)];
    }

    function normalizeText(text) {
      return text.toLowerCase();
    }

    function analyzeMessage(text) {
      const value = normalizeText(text);
      const detectedToxic = [];
      const detectedScam = [];
      const detectedLinks = [];

      toxicWords.forEach((word) => {
        if (value.includes(word)) detectedToxic.push(word);
      });

      scamWords.forEach((word) => {
        if (value.includes(word)) detectedScam.push(word);
      });

      suspiciousLinkWords.forEach((keyword) => {
        if (value.includes(keyword)) detectedLinks.push(keyword);
      });

      if (detectedToxic.length > 0) {
        return {
          type: "toxic",
          title: "❌ Toxic Message",
          explanation: `Detected words: ${detectedToxic.join(", ")}`,
        };
      }

      if (detectedScam.length > 0 || detectedLinks.length > 0) {
        const allDetected = [...detectedScam, ...detectedLinks];
        return {
          type: "scam",
          title: "⚠️ Scam/Suspicious Content",
          explanation: `Detected words: ${allDetected.join(", ")}`,
        };
      }

      return {
        type: "safe",
        title: "✅ Safe Message",
        explanation: "No toxic, scam, or suspicious link patterns detected.",
      };
    }

    function createUserBubble(text) {
      const bubble = document.createElement("div");
      bubble.className = "bubble user";
      bubble.textContent = text;
      return bubble;
    }

    function createSystemBubble(result) {
      const bubble = document.createElement("div");
      bubble.className = `bubble bot ${result.type}`;
      bubble.innerHTML = `
        <div class="result-title">${result.title}</div>
        <div class="explanation">${result.explanation}</div>
        <div class="tip">Safety tip: ${getRandomTip(result.type)}</div>
      `;
      return bubble;
    }

    function updateLiveReply(text) {
      if (!text.trim()) {
        if (liveReplyElement) liveReplyElement.remove();
        liveReplyElement = null;
        return;
      }

      const result = analyzeMessage(text);

      if (!liveReplyElement) {
        liveReplyElement = createSystemBubble(result);
        chatArea.appendChild(liveReplyElement);
      } else {
        liveReplyElement.className = `bubble bot ${result.type}`;
        liveReplyElement.innerHTML = `
          <div class="result-title">${result.title}</div>
          <div class="explanation">${result.explanation}</div>
          <div class="tip">Safety tip: ${getRandomTip(result.type)}</div>
        `;
      }

      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      const userBubble = createUserBubble(text);
      chatArea.appendChild(userBubble);

      if (liveReplyElement) {
        liveReplyElement.remove();
        liveReplyElement = null;
      }

      const result = analyzeMessage(text);
      const systemBubble = createSystemBubble(result);
      chatArea.appendChild(systemBubble);

      messageInput.value = "";
      messageInput.focus();
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    messageInput.addEventListener("input", (event) => {
      updateLiveReply(event.target.value);
    });

    chatForm.addEventListener("submit", (event) => {
      event.preventDefault();
      sendMessage();
    });
  </script>
</body>
</html>
